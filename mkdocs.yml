site_name: NTSB FOIA MU5735
site_description: Archive and unofficial Chinese translation of NTSB FOIA materials related to MU5735.
site_url: https://adminlby.github.io/NTSB_FOIA_MU5735/
repo_url: https://github.com/adminlby/NTSB_FOIA_MU5735
repo_name: adminlby/NTSB_FOIA_MU5735

docs_dir: MU5735_NTSB_Recorder_Report_CN

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest

plugins:
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 资料与分析:
      - NTSB 公开发布资料: ntsb-release.md
      - 事故时间线与数据局限: timeline-data-limits.md
      - 飞行数据可视化:
          - 概览: flight-data-visualization.md
          - TableResolution FDR 记录: fdr/tableresolution.md
      - 现场图片: site-photos.md
      - 电子邮件记录: email-records.md
      - "操纵输入讨论汇总": issue-9-control-inputs.md
      - 第三方项目: third-party-visualizations.md
  - NTSB 记录器报告中文译文: MU5735_NTSB_Recorder_Report_Chinese.md
